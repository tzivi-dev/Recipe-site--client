<div class="add-recipe-container">
    <div class="form-header">
        <h2>הוספת מתכון חדש</h2>
        <div class="underline"></div>
    </div>
    <!-- טופס הוספת מתכון  -->
    <form [formGroup]="recipeForm" (ngSubmit)="onSubmit()">

        <div class="form-group">
            <label>שם המתכון</label>
            <input type="text" formControlName="title" placeholder="איך קוראים למנה המנצחת שלך?">
        </div>

        <div class="form-group">
            <label>הוראות הכנה</label>
            <textarea formControlName="description" rows="5" placeholder="פרטי כאן את שלבי ההכנה..."></textarea>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>סוג מתכון</label>
                <select formControlName="type">
                    <option value="Dairy">🥛 חלבי</option>
                    <option value="Meat">🥩 בשרי</option>
                    <option value="Parve">🥗 פרווה</option>
                </select>
            </div>

            <div class="form-group">
                <label>זמן הכנה (דקות)</label>
                <input type="number" formControlName="prepTime">
            </div>
        </div>

        <div class="file-upload-section">
            <label class="custom-file-upload">
                <!-- טופס הוספת תמונה  -->
                <!-- onFileSelected- פונקציה שטוענת את התמונה שנבחרה -->
                <input type="file" (change)="onFileSelected($event)" accept="image/*">
                <span>📷 בחר תמונה מרהיבה</span>
            </label>
            <!-- אם נבחרה תמונה זה יציג אותה מיד -->
            <div *ngIf="imagePreview" class="image-preview-wrapper">
                <p class="preview-tag">כך זה ייראה בגלריה:</p>
                <img [src]="imagePreview" alt="Preview" class="styled-preview">
            </div>
        </div>

        <div formArrayName="ingredients" class="ingredients-section">
            <h3>רכיבים:</h3>
            <!-- לולאה על רשימת הרכיבים בטופס  -->
            <div *ngFor="let ing of ingredients.controls; let i=index" [formGroupName]="i" class="ingredient-card">
                <input type="text" formControlName="product" placeholder="מוצר">
                <input type="number" formControlName="amount" placeholder="כמות">
                <input type="text" formControlName="unit" placeholder="יחידה">
                <!-- כפתור הסרת רכיב שולח לפונקציה removeIngredient עם האינדקס של הרכיב -->
                <button type="button" class="btn-remove" (click)="removeIngredient(i)" title="הסר">✕</button>
            </div>
            <!-- כפתור הוספת רכיב שולח לפונקציה addIngredient -->
            <button type="button" class="btn-add-ingredient" (click)='addIngredient()'>+ הוסף רכיב</button>
        </div>
        <!-- כפתור שליחת טופס אם הטופס עדיין לא תקין הכפתור לא מאופשר -->
        <button type="submit" class="submit-btn" [disabled]="recipeForm.invalid || isUploading">
            <!-- ברגע שלוחצים והוא מעלה את התמונה זה הופך ל-"רק רגע מעלים" -->
            <span *ngIf="!isUploading">פרסם מתכון עכשיו 🚀</span>
            <span *ngIf="isUploading" class="loader">רק רגע, מעלים...</span>
        </button>
    </form>
</div>
